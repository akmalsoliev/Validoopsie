name: Tests

on:
  push:
    branches: [main]
    paths:
      - "tests/**"
      - "validoopsie/**"
      - ".github/**"
  pull_request:
    paths:
      - "tests/**"
      - "validoopsie/**"

jobs:
  tests:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: ["ubuntu-latest", "windows-latest"]
    runs-on: ${{ matrix.os }}
    env:
      PYSPARK_PYTHON: python
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install the project
        run: uv sync --dev --upgrade

      - name: Setup Hadoop winutils
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/cdarlint/winutils/raw/master/hadoop-3.3.6/bin/winutils.exe"
          $dir = "C:\hadoop\bin"
          New-Item -ItemType Directory -Force -Path $dir
          Invoke-WebRequest -Uri $url -OutFile "$dir\winutils.exe"
          echo "HADOOP_HOME=C:\hadoop" >> $env:GITHUB_ENV

      # Tests
      # Stubtest
      - name: Stubtest
        run: uv run stubtest validoopsie --allowlist stubtest_allowlist.txt
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'

      - name: Run Pytests with doctests
        run: uv run pytest validoopsie --doctest-modules
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'

      - name: Run doctest on stub
        run: uv run python -m doctest validoopsie/validate.pyi
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'

      - name: Run pytests
        run: uv run pytest tests
